<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIRTC - Login</title>
  
  <link href="./static/css/bootstrap.min.css" rel="stylesheet">
  <link href="./static/css/index.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">AIRTC</a>
      <ul class="navbar-nav flex-row ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="introduction.html">Introduction</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://github.com/crickwang/AIRTC" target="_blank">GitHub</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://crickwang.github.io/website/" target="_blank">Portfolio</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="form-container">
      <form id="authForm" class="auth-form">
        <div class="auth-card">
          <div class="auth-title-row">
            <h1>Welcome back</h1>
            <p>Sign in or create an account to continue.</p>
          </div>

          <div class="auth-fields">
            <input type="text" class="auth-input" id="username" placeholder="Username" autocomplete="username">
            <input type="password" class="auth-input" id="password" placeholder="Password" autocomplete="current-password">
          </div>

          <div class="auth-actions">
            <button type="button" class="auth-btn secondary" id="signupButton">Sign up</button>
            <button type="submit" class="auth-btn primary" id="loginButton">Sign in</button>
          </div>

          <div class="auth-message" id="authMessage" aria-live="polite"></div>
        </div>
      </form>
    </div>
  </div>

  <script src="./static/js/bootstrap.bundle.min.js"></script>
  <script src="./static/js/main.js"></script>
  
  <script>
    const authForm = document.getElementById('authForm');
    const signupButton = document.getElementById('signupButton');
    const authMessage = document.getElementById('authMessage');

    function setMessage(message, isError = true) {
      authMessage.textContent = message;
      authMessage.className = isError ? 'auth-message error' : 'auth-message success';
    }

    async function submitAuth(endpoint) {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        setMessage('Enter both username and password.');
        return;
      }

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const payload = await response.json();

        if (response.ok) {
          setMessage('Authentication successful.', false);
          window.location.href = 'generate.html';
          return;
        }

        setMessage(payload.message || 'Authentication failed.');
      } catch (error) {
        console.error('Error:', error);
        setMessage('Connection error. Please try again.');
      }
    }

    authForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      await submitAuth('/login');
    });

    signupButton.addEventListener('click', async function() {
      await submitAuth('/signup');
    });
  </script>
</body>
</html>
