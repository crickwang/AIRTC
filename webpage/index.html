<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIRTC - Login</title>
  
  <link href="./static/css/bootstrap.min.css" rel="stylesheet">
  <link href="./static/css/index.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">AIRTC</a>
      <ul class="navbar-nav flex-row ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="introduction.html">Introduction</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://github.com/crickwang/AIRTC" target="_blank">GitHub</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://crickwang.github.io/website/" target="_blank">Contact</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="form-container">
      <form id="authForm" class="auth-form">
        <div class="auth-card">
          <div class="auth-title-row">
            <h1 id="authTitle">Welcome to AIRTC</h1>
            <p id="authSubtitle">Log in or create an account to continue.</p>
          </div>

          <div class="auth-fields">
            <input type="text" class="auth-input" id="username" placeholder="Username" autocomplete="username">
            <input type="password" class="auth-input" id="password" placeholder="Password" autocomplete="current-password">
          </div>

          <div class="auth-actions">
            <button type="submit" class="auth-btn primary" id="authSubmitButton">Log in</button>
          </div>

          <p class="auth-toggle"><a href="#" id="authToggleLink">Don't have an account? Sign up</a></p>

          <div class="auth-message" id="authMessage" aria-live="polite"></div>
        </div>
      </form>
    </div>
  </div>

  <script src="./static/js/bootstrap.bundle.min.js"></script>
  <script src="./static/js/main.js"></script>
  
  <script>
    const authForm = document.getElementById('authForm');
    const authCard = document.querySelector('.auth-card');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const authSubmitButton = document.getElementById('authSubmitButton');
    const authToggleLink = document.getElementById('authToggleLink');
    const authMessage = document.getElementById('authMessage');

    let mode = 'login';

    function setMessage(message, isError = true) {
      authMessage.textContent = message;
      authMessage.className = isError ? 'auth-message error' : 'auth-message success';

      if (isError && message) {
        authCard.classList.remove('shake');
        void authCard.offsetWidth; // restart animation if triggered twice in a row
        authCard.classList.add('shake');
      }
    }

    function applyMode() {
      if (mode === 'signup') {
        authTitle.textContent = 'Create an account';
        authSubtitle.textContent = 'Sign up to get started.';
        authSubmitButton.textContent = 'Sign up';
        authToggleLink.textContent = 'Already have an account? Log in';
      } else {
        authTitle.textContent = 'Welcome to AIRTC';
        authSubtitle.textContent = 'Log in or create an account to continue.';
        authSubmitButton.textContent = 'Log in';
        authToggleLink.textContent = "Don't have an account? Sign up";
      }
      setMessage('', false);
    }

    authToggleLink.addEventListener('click', function(e) {
      e.preventDefault();
      mode = mode === 'signup' ? 'login' : 'signup';
      applyMode();
    });

    async function submitAuth(endpoint) {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        setMessage('Enter both username and password.');
        return;
      }

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const payload = await response.json();

        if (response.ok) {
          setMessage('Authentication successful.', false);
          window.location.href = 'generate.html';
          return;
        }

        setMessage(payload.message || (mode === 'signup' ? 'Sign up failed.' : 'Log in failed.'));
      } catch (error) {
        console.error('Error:', error);
        setMessage('Connection error. Please try again.');
      }
    }

    authForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      await submitAuth(mode === 'signup' ? '/signup' : '/login');
    });
  </script>
</body>
</html>
