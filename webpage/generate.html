<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIRTC Main Page</title>

  <link href="/static/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/generate.css" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <nav class="navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">AIRTC</a>
      <ul class="navbar-nav flex-row ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link" href="introduction.html">Introduction</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://github.com/crickwang/AIRTC" target="_blank">GitHub</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://crickwang.github.io/website/" target="_blank">Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-login-btn" href="index.html">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="main-container">
    <div class="radio-row">
      <div class="radio-option">
        <input type="radio" name="processingMode" id="onlineOption" value="online">
        <label for="onlineOption">Online Mode</label>
        <small>Process audio remotely</small>
      </div>
      
      <div class="radio-option">
        <input type="radio" name="processingMode" id="localOption" value="local" checked>
        <label for="localOption">Local Mode</label>
        <small>Process audio locally</small>
      </div>
    </div>
    
    <div class="system-prompt-row" id="systemPromptRow">
      <label for="systemPromptInput" class="system-prompt-label" id="systemPromptLabel">Customize the AI's role (optional)</label>
      <div class="input-wrapper">
        <input type="text" id="systemPromptInput" class="system-prompt-input"
               placeholder="e.g. You are a patient French tutor who only speaks French." maxlength="2000">
        <button class="mic-button" id="micButton" type="button" aria-label="Start conversation" onclick="onMicButtonClick()">
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" fill="currentColor"/>
            <path d="M19 11a7 7 0 0 1-14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="transcription-container hidden" id="transcriptionContainer">
      <div class="transcription-box" id="transcriptionBox">
      </div>
    </div>

    <div class="clear-btn-container hidden" id="clearBtnContainer">
      <button class="btn-clear" onclick="clearTranscription()">Clear Transcription</button>
    </div>

    <audio id="remoteAudio" autoplay></audio>
  </div>

  <script src="/static/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
